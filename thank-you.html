<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grazie! - Anri Commerciale</title>
  <meta name="description" content="La tua richiesta è stata inviata con successo. Ti ricontatteremo al più presto." />
  <meta name="robots" content="noindex, follow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet" />

  <!-- Icons (Feather) -->
  <script src="https://unpkg.com/feather-icons"></script>

  <link rel="stylesheet" href="css/style.css" />
  <style>
    .thank-you-section {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1rem;
      background: radial-gradient(circle at top right, var(--primary-light), transparent),
                  radial-gradient(circle at bottom left, rgba(0, 56, 168, 0.05), transparent);
    }

    .thank-you-card {
      max-width: 600px;
      background: white;
      padding: 3.5rem 2rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--border-color);
      animation: fadeInUp 0.8s ease-out;
    }

    .success-icon {
      width: 80px;
      height: 80px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      box-shadow: 0 0 20px rgba(0, 56, 168, 0.3);
    }

    .thank-you-title {
      font-family: var(--font-heading);
      font-size: 3rem;
      color: var(--text-main);
      margin-bottom: 1rem;
      text-transform: uppercase;
      font-weight: 800;
    }

    .thank-you-desc {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .thank-you-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <!-- SIMPLE HEADER (NO NAV) -->
  <header class="site-header scrolled">
    <div class="container header-inner">
      <a href="index.html" class="logo"><img src="img/Logo_OK.jpg" alt="Anri Commerciale" style="height:48px;width:auto;" /></a>
    </div>
  </header>

  <main>
    <section class="thank-you-section">
      <div class="thank-you-card">
        <div class="success-icon">
          <i data-feather="check" style="width: 40px; height: 40px;"></i>
        </div>
        <h1 class="thank-you-title">Richiesta Inviata!</h1>
        <p class="thank-you-desc">
          Grazie per averci contattato. Abbiamo ricevuto i tuoi dati e un nostro consulente tecnico ti risponderà entro 24 ore lavorative per discutere le tue esigenze.
        </p>
        <div class="thank-you-actions">
          <a href="index.html" class="btn btn-primary">
            <i data-feather="home"></i> Torna alla Home
          </a>
          <a href="eshop.html" class="btn btn-ghost">
            Esplora l'E-Shop <i data-feather="shopping-bag"></i>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script>
    feather.replace();
  </script>
</body>

</html>
